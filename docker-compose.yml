version: "3.9"

services:

  moodify-preview:
    profiles: ["preview"]
    build:
      context: .
      dockerfile: Dockerfile.preview
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MOCK_MODE=true
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    restart: unless-stopped

  moodify:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MOCK_MODE=false
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  hf-cache: